name: Selenium Test Suite

on:
  workflow_dispatch:
    inputs:
      test_path:
        description: "Test path or file (e.g. tests/ or tests/test_login.py)"
        required: false
        default: "tests/"
      tags:
        description: "Tag to filter by (e.g. smoke, regression, TC001)"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run tests
        run: |
          if [ -n "${{ github.event.inputs.tags }}" ]; then
            python -m pytest ${{ github.event.inputs.test_path }} --tags=${{ github.event.inputs.tags }} -v --alluredir=allure-results
          else
            python -m pytest ${{ github.event.inputs.test_path }} -v --alluredir=allure-results
          fi
        continue-on-error: true

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: always()

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4